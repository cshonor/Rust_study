[[bin]]
name = "demo_4_3_binary_length_prefix"
path = "4.3-parsing-binary/code/4.3-parsing-binary-length-prefix-demo.rs"

[[bin]]
name = "demo_4_4_summary"
path = "4.4-summary/code/4.4-summary-demo.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
