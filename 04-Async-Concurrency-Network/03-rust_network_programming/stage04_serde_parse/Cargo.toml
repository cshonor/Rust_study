[package]
name = "study_network_ch04"
version = "0.1.0"
edition = "2021"
description = "Network Programming with Rust — Chapter 4 Serde/nom demos"

[[bin]]
name = "demo_4_1_serde_point3d"
path = "4.1-serde-serialization/code/4.1-serde-serialization-point3d-demo.rs"

[[bin]]
name = "demo_4_1_1_custom_rename"
