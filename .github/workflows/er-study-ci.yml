# ER study — 示例 CI（Item 32）
# 复制到活跃项目时按需增删 job；本仓库以文档为主，仅 fmt + clippy + ER-demos 测试。

name: er-study-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  er-demos:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ER/ER-demos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: item-24 re-export
        run: |
          cd item-24-re-export
          cargo run -p consumer
          cargo run -p consumer-newtype
      - name: item-35 sys workspace
        run: |
          cd item-35-sys-workspace
          cargo test --workspace

  msrv:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ER/ER-demos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.70.0
      - name: MSRV check (Item 21)
        run: cargo check --workspace

  item-33-no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: no_std lib check (alloc only)
        run: cargo check -p item-33-no-std --no-default-features --features alloc
        working-directory: ER/ER-demos

  public-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-public-api
        run: cargo install cargo-public-api --locked
      - name: Dump dep-lib public API (Item 24)
        run: |
          cd ER/ER-demos/item-24-re-export/dep-lib
          cargo public-api dump
