# ER study — 示例 CI（Item 32）
# 复制到活跃项目时按需增删 job；本仓库以文档为主。

name: er-study-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  er-demos:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-ER
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: item-24 re-export
        run: |
          cd Chapter-04-Dependencies/Item-24-re-export-api-types/demo
          cargo run -p consumer
          cargo run -p consumer-newtype
      - name: item-35 sys workspace
        run: |
          cd Chapter-06-Beyond-Standard-Rust/Item-35-bindgen/demo-sys-workspace
          cargo test --workspace

  msrv:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-ER
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.100.0
      - name: MSRV check (Item 21)
        run: cargo check --workspace

  item-33-no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: no_std lib check (alloc only)
        run: cargo check -p item-33-no-std --no-default-features --features alloc
        working-directory: 01-ER/Chapter-06-Beyond-Standard-Rust/Item-33-no-std/demo

  public-api:
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 01-ER/Chapter-04-Dependencies/Item-24-re-export-api-types/demo -> target
      - name: Install cargo-public-api
        run: cargo install cargo-public-api --locked
      - name: List dep-lib public API (Item 24)
        run: cargo public-api
        working-directory: 01-ER/Chapter-04-Dependencies/Item-24-re-export-api-types/demo/dep-lib

  semver-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Semver vs base branch (Item 21)
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          manifest-path: 01-ER/Chapter-04-Dependencies/Item-24-re-export-api-types/demo/Cargo.toml
          package: dep-lib
          baseline-rev: ${{ github.event.pull_request.base.ref }}

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          command-arguments: all
          arguments: ""
          manifest-path: ./01-ER/Cargo.toml

  miri:
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: nightly
    defaults:
      run:
        working-directory: 01-ER
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Miri setup (Item 16)
        run: cargo miri setup
      - name: Miri test item-16-miri
        run: cargo miri test -p item-16-miri

  matrix-demo:
    name: matrix (${{ matrix.os }} / ${{ matrix.rust }}${{ matrix.features && format(' / {0}', matrix.features) || '' }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            pkg: item-30-black-box
            features: ""
          - os: windows-latest
            rust: stable
            pkg: item-30-black-box
            features: ""
          - os: macos-latest
            rust: stable
            pkg: item-30-black-box
            features: ""
          - os: ubuntu-latest
            rust: "1.70.0"
            pkg: item-26-feature-creep
            features: ""
          - os: ubuntu-latest
            rust: stable
            pkg: item-26-feature-creep
            features: "--features schema"
          - os: windows-latest
            rust: stable
            pkg: item-26-feature-creep
            features: "--no-default-features"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: 01-ER
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Test ${{ matrix.pkg }}
        run: cargo test -p ${{ matrix.pkg }} ${{ matrix.features }}
