# Item 25：Dependabot —— 自动 PR 更新 Cargo.lock（库 lock 不保护下游，但本仓库 CI 需要）
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: cargo
    directory: /01-ER
    schedule:
      interval: weekly
    labels:
      - dependencies
      - er-demos

  - package-ecosystem: cargo
    directory: /01-ER/Chapter-04-Dependencies/Item-24-re-export-api-types/demo
    schedule:
      interval: weekly
    labels:
      - dependencies
      - item-24

  - package-ecosystem: cargo
    directory: /01-ER/Chapter-06-Beyond-Standard-Rust/Item-35-bindgen/demo-sys-workspace
    schedule:
      interval: weekly
    labels:
      - dependencies
      - item-35

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
